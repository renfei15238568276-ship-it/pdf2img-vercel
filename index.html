<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📄 PDF工具箱 - VIP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 15px; }
    .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    h1 { color: #333; margin-bottom: 12px; font-size: 20px; text-align: center; }
    .vip-banner { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #000; padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 12px; cursor: pointer; font-size: 14px; }
    .vip-active { background: #07c160; color: white; }
    .menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .menu-item { background: #f5f5f5; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; }
    .menu-item.active { background: #667eea; color: white; }
    .menu-icon { font-size: 20px; }
    .menu-text { font-size: 11px; margin-top: 2px; }
    .section { display: none; }
    .section.active { display: block; }
    .settings { background: #f5f5f5; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .setting-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .setting-label { color: #666; font-size: 12px; }
    input, select { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; }
    .upload-area { border: 2px dashed #667eea; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; background: #f8fafc; }
    .upload-icon { font-size: 28px; }
    .upload-text { color: #667eea; font-size: 12px; margin-top: 4px; }
    .preview { margin-top: 10px; }
    .preview-item { background: #f9f9f9; padding: 8px; border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
    .btn { display: block; width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 PDF工具箱</h1>
    
    <div class="vip-banner" id="vipBanner" onclick="showVip()">
      🌟 开通VIP - ¥9.9/月 全部功能无限用
    </div>
    
    <div class="menu">
      <div class="menu-item active" onclick="showSection('pdf2img')"><div class="menu-icon">📄</div><div class="menu-text">PDF转图片</div></div>
      <div class="menu-item" onclick="showSection('img2pdf')"><div class="menu-icon">🖼️</div><div class="menu-text">图片转PDF</div></div>
      <div class="menu-item" onclick="showSection('pdfmerge')"><div class="menu-icon">📑</div><div class="menu-text">PDF合并</div></div>
      <div class="menu-item" onclick="showSection('pdfcompress')"><div class="menu-icon">📉</div><div class="menu-text">PDF压缩</div></div>
      <div class="menu-item" onclick="showSection('pdfencrypt')"><div class="menu-icon">🔒</div><div class="menu-text">PDF加密</div></div>
      <div class="menu-item" onclick="showSection('pdfdecrypt')"><div class="menu-icon">🔓</div><div class="menu-text">PDF解密</div></div>
    </div>
    
    <!-- PDF转图片 -->
    <div class="section active" id="pdf2img">
      <div class="settings">
        <div class="setting-row"><span class="setting-label">图片质量</span><select id="quality"><option value="1">标准</option><option value="2">高清</option></select></div>
        <div class="setting-row"><span class="setting-label">图片格式</span><select id="format"><option value="png">PNG</option><option value="jpeg">JPEG</option></select></div>
      </div>
      <div class="upload-area" onclick="checkVipOrSelect()">
        <div class="upload-icon">📁</div>
        <div class="upload-text">点击选择PDF文件</div>
      </div>
      <input type="file" id="fileInput" accept=".pdf" onchange="handlePdfFile(this.files[0])">
      <div id="preview" class="preview"></div>
    </div>
    
    <!-- 图片转PDF -->
    <div class="section" id="img2pdf">
      <div class="upload-area" onclick="checkVipOrSelect()">
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">点击选择图片（多选）</div>
      </div>
      <input type="file" id="imgInput" accept="image/*" multiple onchange="handleImgFiles(this.files)">
      <div id="imgPreview" class="preview"></div>
      <button class="btn" onclick="convertImgToPdf()">转换为PDF</button>
    </div>
    
    <!-- PDF合并 -->
    <div class="section" id="pdfmerge">
      <div class="upload-area" onclick="checkVipOrSelect()">
        <div class="upload-icon">📑</div>
        <div class="upload-text">点击选择多个PDF</div>
      </div>
      <input type="file" id="mergeInput" accept=".pdf" multiple onchange="handleMergeFiles(this.files)">
      <div id="mergePreview" class="preview"></div>
      <button class="btn" onclick="mergePdfs()">合并PDF</button>
    </div>
    
    <!-- PDF压缩 -->
    <div class="section" id="pdfcompress">
      <div class="upload-area" onclick="checkVipOrSelect()">
        <div class="upload-icon">📉</div>
        <div class="upload-text">点击选择PDF</div>
      </div>
      <input type="file" id="compressInput" accept=".pdf" onchange="handleCompressFile(this.files[0])">
      <div id="compressPreview" class="preview"></div>
      <button class="btn" onclick="compressPdf()">压缩PDF</button>
    </div>
    
    <!-- PDF加密 -->
    <div class="section" id="pdfencrypt">
      <div class="settings">
        <div class="setting-row"><span class="setting-label">设置密码</span><input type="password" id="encryptPwd" placeholder="请输入密码"></div>
      </div>
      <div class="upload-area" onclick="checkVipOrSelect()">
        <div class="upload-icon">🔒</div>
        <div class="upload-text">点击选择PDF</div>
      </div>
      <input type="file" id="encryptInput" accept=".pdf" onchange="handleEncryptFile(this.files[0])">
      <div id="encryptPreview" class="preview"></div>
      <button class="btn" onclick="encryptPdf()">加密PDF</button>
    </div>
    
    <!-- PDF解密 -->
    <div class="section" id="pdfdecrypt">
      <div class="settings">
        <div class="setting-row"><span class="setting-label">输入密码</span><input type="password" id="decryptPwd" placeholder="请输入PDF密码"></div>
      </div>
      <div class="upload-area" onclick="checkVipOrSelect()">
        <div class="upload-icon">🔓</div>
        <div class="upload-text">点击选择PDF</div>
      </div>
      <input type="file" id="decryptInput" accept=".pdf" onchange="handleDecryptFile(this.files[0])">
      <div id="decryptPreview" class="preview"></div>
      <button class="btn" onclick="decryptPdf()">解密PDF</button>
    </div>
  </div>
  
  <!-- VIP弹窗 -->
  <div id="vipModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;justify-content:center;align-items:center;">
    <div style="background:white;padding:20px;border-radius:16px;max-width:300px;width:90%;text-align:center;">
      <h2 style="color:#667eea;margin-bottom:15px;">👑 VIP特权</h2>
      <p style="font-size:14px;color:#666;margin-bottom:15px;">✅ 全部功能无限用<br>✅ 批量下载<br>✅ 无广告</p>
      <div style="font-size:28px;color:#e74c3c;font-weight:bold;margin-bottom:15px;">¥9.9/月</div>
      <img src="https://raw.githubusercontent.com/renfei15238568276-ship-it/pdf2img-images/main/wechat.jpg" style="width:140px;height:140px;border-radius:8px;margin-bottom:10px;">
      <p style="font-size:12px;color:#666;margin-bottom:10px;">长按二维码付款</p>
      <div style="background:#f5f5f5;padding:10px;border-radius:8px;margin-bottom:10px;">
        <p style="font-size:13px;">付款后联系微信:</p>
        <p style="font-size:16px;font-weight:bold;color:#07c160;">r18974670134</p>
      </div>
      <p style="font-size:13px;color:#666;margin-bottom:10px;">或输入兑换码:</p>
      <input type="text" id="vipCode" placeholder="客服给的兑换码" style="width:100%;padding:10px;margin-bottom:10px;">
      <button class="btn" onclick="redeemCode()">立即开通</button>
      <button class="btn" style="background:#999;margin-top:8px;" onclick="closeVip()">关闭</button>
    </div>
  </div>
  
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const { jsPDF } = window.jspdf;
    const { PDFDocument } = PDFLib;
    
    let isVip = localStorage.getItem('isVip') === 'true';
    let currentFileName = '', convertedImages = [], selectedImages = [], mergeFilesList = [], compressFileData = null, encryptFileData = null, decryptFileData = null;
    
    if (isVip) {
      document.getElementById('vipBanner').innerHTML = '👑 VIP会员 - 全部功能无限用';
      document.getElementById('vipBanner').classList.add('vip-active');
    }
    
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.currentTarget.classList.add('active');
    }
    
    function showVip() {
      if (isVip) { alert('您已经是VIP了'); return; }
      document.getElementById('vipModal').style.display = 'flex';
    }
    function closeVip() { document.getElementById('vipModal').style.display = 'none'; }
    
    function checkVipOrSelect() {
      if (!isVip) { showVip(); return; }
      // VIP用户可以继续
    }
    
    function redeemCode() {
      const code = document.getElementById('vipCode').value.trim().toLowerCase();
      if (code === 'vip125521') {
        isVip = true;
        localStorage.setItem('isVip', 'true');
        document.getElementById('vipBanner').innerHTML = '👑 VIP会员 - 全部功能无限用';
        document.getElementById('vipBanner').classList.add('vip-active');
        alert('✅ VIP开通成功！');
        closeVip();
      } else { alert('兑换码无效'); }
    }
    
    async function handlePdfFile(file) {
      if (!file) return;
      currentFileName = file.name;
      const quality = parseFloat(document.getElementById('quality').value);
      const format = document.getElementById('format').value;
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
      document.getElementById('preview').innerHTML = '<div style="text-align:center;padding:15px;">⏳ 转换中...</div>';
      convertedImages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({scale: quality});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
        convertedImages.push({ page: i, data: canvas.toDataURL('image/' + format, 0.9) });
        document.getElementById('preview').innerHTML = '<div style="text-align:center;">⏳ ' + i + '/' + pdf.numPages + '</div>';
      }
      let html = '<div style="margin-bottom:8px;">✅ 完成 (' + pdf.numPages + '页)</div>';
      convertedImages.forEach(img => { html += '<div class="preview-item"><img src="' + img.data + '" style="max-width:100%"></div>'; });
      html += '<button class="btn" onclick="downloadAllImages()">📦 批量下载</button>';
      document.getElementById('preview').innerHTML = html;
    }
    
    async function downloadAllImages() {
      const format = document.getElementById('format').value;
      const zip = new JSZip();
      convertedImages.forEach(img => { zip.file('page_' + img.page + '.' + format, img.data.split(',')[1], {base64: true}); });
      const blob = await zip.generateAsync({type:'blob'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = currentFileName.replace('.pdf', '_images.zip');
      a.click();
    }
    
    function handleImgFiles(files) {
      selectedImages = Array.from(files);
      document.getElementById('imgPreview').innerHTML = '<div class="preview-item">已选择 ' + files.length + ' 张图片</div>';
    }
    function convertImgToPdf() {
      if (selectedImages.length === 0) { alert('请先选择图片'); return; }
      const doc = new jsPDF();
      selectedImages.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            if (i > 0) doc.addPage();
            doc.addImage(e.target.result, 'JPEG', 0, 0, 210, (img.height * 210) / img.width);
            if (i === selectedImages.length - 1) { doc.save('images.pdf'); alert('✅ 完成！'); }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }
    
    function handleMergeFiles(files) {
      mergeFilesList = Array.from(files);
      document.getElementById('mergePreview').innerHTML = '<div class="preview-item">已选择 ' + files.length + ' 个PDF</div>';
    }
    async function mergePdfs() {
      if (mergeFilesList.length < 2) { alert('至少2个'); return; }
      try {
        const mergedPdf = await PDFDocument.create();
        for (const file of mergeFilesList) {
          const pdf = await PDFDocument.load(await file.arrayBuffer());
          const copied = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
          copied.forEach(page => mergedPdf.addPage(page));
        }
        const blob = new Blob([await mergedPdf.save()], {type:'application/pdf'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'merged.pdf';
        a.click();
      } catch(e) { alert('失败: ' + e.message); }
    }
    
    function handleCompressFile(file) { compressFileData = file; document.getElementById('compressPreview').innerHTML = '<div class="preview-item">📄 ' + file.name + '</div>'; }
    async function compressPdf() {
      if (!compressFileData) return;
      try {
        const pdfDoc = await PDFDocument.load(await compressFileData.arrayBuffer());
        const blob = new Blob([await pdfDoc.save({useObjectStreams:true})], {type:'application/pdf'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'compressed.pdf';
        a.click();
      } catch(e) { alert('失败: ' + e.message); }
    }
    
    function handleEncryptFile(file) { encryptFileData = file; document.getElementById('encryptPreview').innerHTML = '<div class="preview-item">📄 ' + file.name + '</div>'; }
    async function encryptPdf() {
      if (!encryptFileData) return;
      const pwd = document.getElementById('encryptPwd').value;
      if (!pwd) { alert('请输入密码'); return; }
      try {
        const pdfDoc = await PDFDocument.load(await encryptFileData.arrayBuffer());
        pdfDoc.encrypt({userPassword:pwd, ownerPassword:pwd, permissions:{printing:'high'}});
        const blob = new Blob([await pdfDoc.save()], {type:'application/pdf'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'encrypted.pdf';
        a.click();
      } catch(e) { alert('失败: ' + e.message); }
    }
    
    function handleDecryptFile(file) { decryptFileData = file; document.getElementById('decryptPreview').innerHTML = '<div class="preview-item">📄 ' + file.name + '</div>'; }
    async function decryptPdf() {
      if (!decryptFileData) return;
      const pwd = document.getElementById('decryptPwd').value;
      if (!pwd) { alert('请输入密码'); return; }
      try {
        const pdfDoc = await PDFDocument.load(await decryptFileData.arrayBuffer(), {password:pwd});
        pdfDoc.encrypt({userPassword:'', ownerPassword:''});
        const blob = new Blob([await pdfDoc.save()], {type:'application/pdf'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'decrypted.pdf';
        a.click();
      } catch(e) { alert('失败'); }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📄 PDF工具箱 - VIP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 15px; }
    .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    h1 { color: #333; margin-bottom: 15px; font-size: 20px; text-align: center; }
    .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
    .menu-item { background: #f5f5f5; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .menu-item:hover { background: #e8e8e8; transform: scale(1.02); }
    .menu-item.active { background: #667eea; color: white; }
    .menu-icon { font-size: 28px; margin-bottom: 5px; }
    .menu-text { font-size: 14px; font-weight: bold; }
    .section { display: none; }
    .section.active { display: block; }
    .settings { background: #f5f5f5; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .setting-label { color: #666; font-size: 13px; }
    select { padding: 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .upload-area { border: 2px dashed #667eea; border-radius: 10px; padding: 30px 15px; text-align: center; cursor: pointer; background: #f8fafc; }
    .upload-icon { font-size: 40px; }
    .upload-text { color: #667eea; margin-top: 8px; font-size: 14px; }
    #fileInput, #imgInput { display: none; }
    #preview { margin-top: 12px; }
    .preview-item { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    .preview-item img { max-width: 100%; border-radius: 6px; }
    .btn { display: block; width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .vip-badge { display: none; background: linear-gradient(90deg, #ffd700, #ffaa00); color: #000; padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; margin-bottom: 10px; text-align: center; }
    .vip-badge.show { display: block; }
    .history-btn { position: fixed; bottom: 15px; right: 15px; width: 40px; height: 40px; background: #667eea; border-radius: 50%; font-size: 18px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 PDF工具箱</h1>
    
    <div class="vip-badge" id="vipBadge">👑 VIP会员</div>
    
    <div class="menu">
      <div class="menu-item active" onclick="showSection('pdf2img')">
        <div class="menu-icon">📄</div>
        <div class="menu-text">PDF转图片</div>
      </div>
      <div class="menu-item" onclick="showSection('img2pdf')">
        <div class="menu-icon">🖼️</div>
        <div class="menu-text">图片转PDF</div>
      </div>
      <div class="menu-item" onclick="showSection('pdfmerge')">
        <div class="menu-icon">📑</div>
        <div class="menu-text">PDF合并</div>
      </div>
      <div class="menu-item" onclick="showSection('pdfencrypt')">
        <div class="menu-icon">🔒</div>
        <div class="menu-text">PDF加密</div>
      </div>
    </div>
    
    <!-- PDF转图片 -->
    <div class="section active" id="pdf2img">
      <div class="settings">
        <div class="setting-row">
          <span class="setting-label">图片质量</span>
          <select id="quality">
            <option value="1">标准</option>
            <option value="2">高清</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">图片格式</span>
          <select id="format">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
          </select>
        </div>
      </div>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <div class="upload-text">点击选择PDF文件</div>
      </div>
      <input type="file" id="fileInput" accept=".pdf" onchange="handlePdfFile(this.files[0])">
      <div id="preview"></div>
    </div>
    
    <!-- 图片转PDF -->
    <div class="section" id="img2pdf">
      <div class="upload-area" onclick="document.getElementById('imgInput').click()">
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">点击选择图片（可多选）</div>
      </div>
      <input type="file" id="imgInput" accept="image/*" multiple onchange="handleImgFiles(this.files)">
      <div id="imgPreview"></div>
      <button class="btn" onclick="convertImgToPdf()">转换为PDF</button>
    </div>
    
    <!-- PDF合并 -->
    <div class="section" id="pdfmerge">
      <div class="upload-area" onclick="document.getElementById('mergeInput').click()">
        <div class="upload-icon">📑</div>
        <div class="upload-text">点击选择多个PDF文件</div>
      </div>
      <input type="file" id="mergeInput" accept=".pdf" multiple onchange="handleMergeFiles(this.files)">
      <div id="mergePreview"></div>
      <button class="btn" onclick="mergePdfs()">合并PDF</button>
    </div>
    
    <!-- PDF加密 -->
    <div class="section" id="pdfencrypt">
      <div class="settings">
        <div class="setting-row">
          <span class="setting-label">设置密码</span>
          <input type="text" id="encryptPwd" placeholder="请输入密码" style="width:120px;padding:6px;">
        </div>
      </div>
      <div class="upload-area" onclick="document.getElementById('encryptInput').click()">
        <div class="upload-icon">🔒</div>
        <div class="upload-text">点击选择要加密的PDF</div>
      </div>
      <input type="file" id="encryptInput" accept=".pdf" onchange="handleEncryptFile(this.files[0])">
      <div id="encryptPreview"></div>
      <button class="btn" onclick="encryptPdf()">加密PDF</button>
    </div>
  </div>
  
  <div class="history-btn" onclick="showHistory()">📜</div>
  
  <div id="historyModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;">
    <div style="background:white;padding:16px;max-height:80vh;overflow-y:auto;border-radius:16px;margin:15px;">
      <h3>📜 转换历史</h3>
      <div id="historyList"></div>
      <button onclick="document.getElementById('historyModal').style.display='none'" style="margin-top:12px;padding:10px;width:100%;background:#667eea;color:white;border:none;border-radius:8px;">关闭</button>
    </div>
  </div>
  
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const { jsPDF } = window.jspdf;
    
    let currentFileName = '';
    let convertedImages = [];
    let selectedImages = [];
    let mergeFiles = [];
    let encryptFile = null;
    
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.currentTarget.classList.add('active');
    }
    
    function addHistory(name, type) {
      const history = JSON.parse(localStorage.getItem('pdfHistory') || '[]');
      history.unshift({ name, type, date: new Date().toLocaleString() });
      localStorage.setItem('pdfHistory', JSON.stringify(history.slice(0, 20)));
    }
    
    function showHistory() {
      const history = JSON.parse(localStorage.getItem('pdfHistory') || '[]');
      document.getElementById('historyList').innerHTML = history.length ? 
        history.map(h => `<div style="padding:8px;border-bottom:1px solid #eee;font-size:12px;">${h.type}<br>${h.name || ''}<br>${h.date}</div>`).join('') : 
        '<p style="color:#999;">暂无记录</p>';
      document.getElementById('historyModal').style.display = 'block';
    }
    
    // PDF转图片
    async function handlePdfFile(file) {
      if (!file) return;
      currentFileName = file.name;
      const quality = parseFloat(document.getElementById('quality').value);
      const format = document.getElementById('format').value;
      
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
      
      const preview = document.getElementById('preview');
      preview.innerHTML = '<div style="text-align:center;padding:15px;">⏳ 转换中...</div>';
      
      convertedImages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({scale: quality});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
        convertedImages.push({ page: i, data: canvas.toDataURL('image/' + format, 0.9) });
        preview.innerHTML = `<div style="text-align:center;">⏳ ${i}/${pdf.numPages}</div>`;
      }
      
      addHistory(file.name, 'PDF转图片');
      
      let html = `<div style="margin-bottom:10px;">✅ 完成 (${pdf.numPages}页)</div>`;
      convertedImages.forEach(img => {
        html += `<div class="preview-item"><img src="${img.data}"></div>`;
      });
      html += '<button class="btn" onclick="downloadAllImages()">📦 批量下载</button>';
      preview.innerHTML = html;
    }
    
    async function downloadAllImages() {
      const format = document.getElementById('format').value;
      const zip = new JSZip();
      convertedImages.forEach(img => {
        zip.file(`page_${img.page}.${format}`, img.data.split(',')[1], {base64: true});
      });
      const blob = await zip.generateAsync({type:'blob'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = currentFileName.replace('.pdf', '_images.zip');
      a.click();
    }
    
    // 图片转PDF
    function handleImgFiles(files) {
      selectedImages = Array.from(files);
      let html = '<div style="margin:10px 0;">已选择 ' + files.length + ' 张图片</div>';
      Array.from(files).forEach((f, i) => {
        html += `<div class="preview-item">${i+1}. ${f.name}</div>`;
      });
      document.getElementById('imgPreview').innerHTML = html;
    }
    
    function convertImgToPdf() {
      if (selectedImages.length === 0) { alert('请先选择图片'); return; }
      
      const doc = new jsPDF();
      selectedImages.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            if (i > 0) doc.addPage();
            const imgWidth = 210;
            const imgHeight = (img.height * imgWidth) / img.width;
            doc.addImage(e.target.result, 'JPEG', 0, 0, imgWidth, imgHeight);
            if (i === selectedImages.length - 1) {
              doc.save('converted.pdf');
              addHistory('图片转PDF', '图片转PDF');
            }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }
    
    // PDF合并
    function handleMergeFiles(files) {
      mergeFiles = Array.from(files);
      let html = '<div style="margin:10px 0;">已选择 ' + files.length + ' 个PDF</div>';
      Array.from(files).forEach((f, i) => {
        html += `<div class="preview-item">${i+1}. ${f.name}</div>`;
      });
      document.getElementById('mergePreview').innerHTML = html;
    }
    
    async function mergePdfs() {
      if (mergeFiles.length < 2) { alert('请至少选择2个PDF'); return; }
      alert('合并功能开发中...');
    }
    
    // PDF加密
    function handleEncryptFile(file) {
      if (!file) return;
      encryptFile = file;
      document.getElementById('encryptPreview').innerHTML = '<div class="preview-item">📄 ' + file.name + '</div>';
    }
    
    function encryptPdf() {
      if (!encryptFile) { alert('请先选择PDF'); return; }
      const pwd = document.getElementById('encryptPwd').value;
      if (!pwd) { alert('请输入密码'); return; }
      alert('加密功能开发中...');
    }
  </script>
</body>
</html>
